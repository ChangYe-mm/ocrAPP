plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.example.ticketocr'
    compileSdk 34

    defaultConfig {
        applicationId "com.example.ticketocr"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'com.google.mlkit:text-recognition:16.0.1'
    implementation 'androidx.core:core-ktx:1.12.0'
}
